name: Deploy via CCM API

on:
  workflow_run:
    workflows: ["CI, build, publish"]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master' }}
    runs-on: [self-hosted, linux]
    env:
      CCM_URL: ${{ vars.CCM_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate deployment inputs
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${CCM_URL}" ] || { echo "CCM_URL secret is required"; exit 1; }
          [ -n "${CLOUDFLARE_API_TOKEN}" ] || { echo "CLOUDFLARE_API_TOKEN secret is required"; exit 1; }
          [ -f docker-compose.yml ] || { echo "docker-compose.yml not found"; exit 1; }
          [ -f caddy/Caddyfile.example ] || { echo "caddy/Caddyfile.example not found"; exit 1; }

      - name: Deploy compose, caddyfile, and env via CCM
        shell: bash
        run: |
          set -euo pipefail

          env_file_content=$'CLOUDFLARE_API_TOKEN='"${CLOUDFLARE_API_TOKEN}"$'\n'

          jq -cn \
            --arg ccm_stack "ccm" \
            --arg repo "${GITHUB_REPOSITORY}" \
            --arg sha "${SOURCE_SHA}" \
            --rawfile compose_yml docker-compose.yml \
            --rawfile caddyfile caddy/Caddyfile.example \
            --arg env_file "${env_file_content}" \
            --argjson run_compose false \
            '{
              ccm_stack: $ccm_stack,
              repo: $repo,
              sha: $sha,
              compose_yml: $compose_yml,
              caddyfile: $caddyfile,
              env_file: $env_file,
              run_compose: $run_compose
            }' > deploy-payload.json

          deploy_code="$(
            curl -sS -o deploy-response.json -w '%{http_code}' \
              -X POST "${CCM_URL}/v1/deploy" \
              -H "Content-Type: application/json" \
              --data @deploy-payload.json
          )"
          if [ "${deploy_code}" -lt 200 ] || [ "${deploy_code}" -ge 300 ]; then
            echo "Deploy failed with HTTP ${deploy_code}"
            cat deploy-response.json
            exit 1
          fi
          cat deploy-response.json

      - name: Trigger CCM special self-redeploy
        shell: bash
        run: |
          set -euo pipefail

          curl_rc=0
          redeploy_code="$(
            curl -sS -o redeploy-response.json -w '%{http_code}' \
              -X POST "${CCM_URL}/v1/compose/ccm/redeploy" \
              -H "Content-Type: application/json"
          )" || curl_rc=$?
          if [ "${redeploy_code}" -ge 200 ] && [ "${redeploy_code}" -lt 300 ]; then
            cat redeploy-response.json
            exit 0
          fi

          if [ "${redeploy_code}" = "502" ] || [ "${redeploy_code}" = "000" ] || [ "${curl_rc}" -ne 0 ]; then
            echo "Self-redeploy request was interrupted (HTTP ${redeploy_code}, curl exit ${curl_rc}); continuing."
            cat redeploy-response.json
            exit 0
          fi

          echo "Self-redeploy failed with HTTP ${redeploy_code}"
          cat redeploy-response.json
          exit 1